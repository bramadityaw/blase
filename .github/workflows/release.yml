name: Release

on:
  push:
    branches:
      - main
#    tags:
#      - "*.*.*"

jobs:
  build-binary-and-extension:
    name: Build blase binary (${{ matrix.os }})
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            code_target: linux-x64
            artifact_name: blase
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            code_target: win32-x64
            artifact_name: blase.exe
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - name: Build executable
        run: cargo build --release --package blase --manifest-path ./crates/blase/Cargo.toml --target ${{ matrix.target }}
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: editors/vscode/package-lock.json
      - name: Move binary executable into VS Code extension
        run: node dist.js target/${{ matrix.target }}/release/${{ matrix.artifact_name }}
      - name: Package extension into VSIX file
        run: |
          npm ci
          npx --no-install vsce package --target ${{ matrix.code_target }} --out blase.vsix
      - name: Upload binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: blase-${{ matrix.target }}
          path: target/${{ matrix.target }}/release/${{ matrix.artifact_name }}
      - name: Upload VSIX artifact
        uses: actions/upload-artifact@v4
        with:
          name: vsix
          path: editors/vscode/blase.vsix

  release:
    name: Upload to GitHub Release
    needs: [build-binary, package-vsix]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: blase-x86_64-unknown-linux-gnu
      - uses: actions/download-artifact@v4
        with:
          name: blase-x86_64-pc-windows-msvc
      - uses: actions/download-artifact@v4
        with:
          name: vsix
      - name: Upload artifacts to release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            blase
            blase.exe
            blase.vsix
          generate_release_notes: true
